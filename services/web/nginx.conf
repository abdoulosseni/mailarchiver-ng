# Rate-limiting des connexions (anti-bruteforce, en complément du verrouillage
# de compte côté API). Contexte http (conf.d est inclus dans http {}).
limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;

server {
    listen 80;
    # TLS : certificat auto-signé monté depuis ./secrets (généré par `make keys`).
    # En production : remplacer par un certificat émis par une AC.
    listen 443 ssl;
    ssl_certificate     /secrets/smtp_cert.pem;
    ssl_certificate_key /secrets/smtp_key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité (toujours envoyés).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # DNS interne de Docker + variable d'upstream : force nginx à RE-RÉSOUDRE
    # l'IP de `api` à chaque requête (sinon il fige l'IP au démarrage et renvoie
    # 502 dès que le conteneur api est recréé avec une nouvelle IP).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    # Flux SSE temps réel : pas de bufferisation, connexion longue.
    location /events/ {
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /auth/      { limit_req zone=login burst=10 nodelay; proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /users         { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /settings      { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /stats         { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    # Scrape Prometheus : réservé au réseau interne (api:8000), jamais public.
    location = /metrics/prometheus { return 403; }
    location /metrics       { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /dlq           { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /fetch-sources { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /transfer-jobs { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /search     { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /messages/  { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /import/    { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /health     { proxy_pass http://$api_upstream; proxy_set_header Host $host; }

    # Assets hashés par Vite : immuables → cache long.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html : jamais mis en cache. NB : définir un add_header ici annule
    # l'héritage des add_header du serveur → on réémet les en-têtes de sécurité.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # SPA Vue : history mode (toutes les autres routes → index.html).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
