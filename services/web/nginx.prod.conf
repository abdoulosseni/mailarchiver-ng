# Config nginx de PRODUCTION : redirection forcée HTTP → HTTPS.
# Montée par docker-compose.ha.yml sur /etc/nginx/conf.d/default.conf.
# (En dev, on garde la config double-écoute pour http://localhost:8080.)
limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;

# Port 80 : redirige tout vers HTTPS (443 standard en prod).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    # En production : monter ici un certificat émis par une AC (cf. docker-compose.ha.yml).
    ssl_certificate     /secrets/smtp_cert.pem;
    ssl_certificate_key /secrets/smtp_key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    location /events/ {
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location /auth/      { limit_req zone=login burst=10 nodelay; proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /users         { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /settings      { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /stats         { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location = /metrics/prometheus { return 403; }
    location /metrics       { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /dlq           { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /fetch-sources { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /transfer-jobs { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /search     { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /messages/  { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /import/    { proxy_pass http://$api_upstream; proxy_set_header Host $host; }
    location /health     { proxy_pass http://$api_upstream; proxy_set_header Host $host; }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
