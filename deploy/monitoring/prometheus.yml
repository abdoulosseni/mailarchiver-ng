global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Métriques applicatives MailArchiver-NG (scrape interne, jamais via l'ingress).
  - job_name: 'mailarchiver-api'
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ['api:8000']

  # Exporters d'infra recommandés en production (à ajouter) :
  #  - postgres_exporter (réplication, connexions, locks)
  #  - rabbitmq prometheus plugin (port 15692)
  #  - opensearch-exporter / node_exporter
  # - job_name: 'rabbitmq'
  #   static_configs: [{ targets: ['rabbitmq:15692'] }]
