# Configuration Alembic. La sqlalchemy.url est surchargée par DATABASE_URL
# (cf. env.py). Lancer depuis la racine du dépôt :
#   DATABASE_URL=postgresql+asyncpg://... alembic -c migrations/alembic.ini upgrade head
[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://mailarchiver:change-me@localhost:5432/mailarchiver

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
qualname =
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
